<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportsAI - Video Analysis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        input[type="file"] { display: none; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .status.processing { background: #fff3cd; color: #856404; display: block; }
        .status.done { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }
        .progress-bar.active { display: block; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 SportsAI</h1>
        <p>Upload your sports video for AI analysis</p>
        
        <div class="upload-area" id="uploadArea">
            <p>📁 Drag & drop video here or click to browse</p>
            <p style="font-size: 12px; color: #999; margin-top: 10px;">MP4, MOV, AVI up to 500MB</p>
        </div>
        <input type="file" id="fileInput" accept="video/*">
        
        <button class="btn" id="uploadBtn" disabled>Upload & Analyze</button>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        const API_URL = "https://sportsai-api-y7wg.onrender.com";
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        
        let selectedFile = null;
        let jobId = null;

        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            selectedFile = file;
            uploadBtn.disabled = false;
            uploadArea.innerHTML = `<p>📹 ${file.name}</p><p style="font-size: 12px; color: #666;">${(file.size/1024/1024).toFixed(2)} MB</p>`;
        });

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            uploadBtn.disabled = true;
            showStatus('Getting upload URL...', 'processing');
            
            try {
                const response = await fetch(`${API_URL}/upload?filename=${encodeURIComponent(selectedFile.name)}`, {
                    method: 'POST'
                });
                
                if (!response.ok) throw new Error('Failed to get upload URL');
                
                const data = await response.json();
                jobId = data.jobId;
                
                showStatus('Uploading video...', 'processing');
                progressBar.classList.add('active');
                
                const xhr = new XMLHttpRequest();
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        progressFill.style.width = (e.loaded / e.total * 100) + '%';
                    }
                });
                
                await new Promise((resolve, reject) => {
                    xhr.open('PUT', data.uploadUrl);
                    xhr.onload = () => xhr.status === 200 ? resolve() : reject(new Error('Upload failed'));
                    xhr.onerror = () => reject(new Error('Upload failed'));
                    xhr.send(selectedFile);
                });
                
                showStatus('Uploaded! Processing with AI... (2-5 minutes)', 'processing');
                progressBar.classList.remove('active');
                
                pollStatus();
                
            } catch (err) {
                showStatus('Error: ' + err.message, 'error');
                uploadBtn.disabled = false;
            }
        });

        async function pollStatus() {
            const check = async () => {
                try {
                    const res = await fetch(`${API_URL}/status/${jobId}`);
                    const data = await res.json();
                    
                    if (data.status === 'completed') {
                        showStatus('✅ Done! <a href="' + data.output + '" target="_blank">View Results</a>', 'done');
                    } else if (data.status === 'error') {
                        showStatus('❌ Failed: ' + (data.error || 'Unknown'), 'error');
                    } else {
                        showStatus(`⏳ ${data.status}...`, 'processing');
                        setTimeout(check, 3000);
                    }
                } catch (err) {
                    showStatus('Error checking: ' + err.message, 'error');
                }
            };
            check();
        }

        function showStatus(msg, type) {
            status.innerHTML = msg;
            status.className = 'status ' + type;
        }
    </script>
</body>
</html>
